name: 🚀 Imyanya Web — CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  BUILD_DIR: dist

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Install & Cache
  # ──────────────────────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies (clean)
        run: npm ci

      - name: 💾 Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

  # ──────────────────────────────────────────────
  # JOB 2 — Lint
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ♻️ Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: 🔍 Run ESLint
        run: npm run lint --if-present

  # ──────────────────────────────────────────────
  # JOB 3 — Build
  # ──────────────────────────────────────────────
  build:
    name: 🏗️ Build (Vite)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ♻️ Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: 🔐 Inject environment variables
        run: |
          cat > .env << EOF
          VITE_NODE_ENV=production
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_MYJOB_HOST_NAME=${{ secrets.VITE_MYJOB_HOST_NAME }}
          VITE_EMPLOYER_MYJOB_HOST_NAME=${{ secrets.VITE_EMPLOYER_MYJOB_HOST_NAME }}
          VITE_FACEBOOK_CLIENT_ID=${{ secrets.VITE_FACEBOOK_CLIENT_ID }}
          VITE_FACEBOOK_CLIENT_SECRET=${{ secrets.VITE_FACEBOOK_CLIENT_SECRET }}
          VITE_MYJOB_SERVER_CLIENT_ID=${{ secrets.VITE_MYJOB_SERVER_CLIENT_ID }}
          VITE_MYJOB_SERVER_CLIENT_SECRECT=${{ secrets.VITE_MYJOB_SERVER_CLIENT_SECRECT }}
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET=${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          VITE_GOONGAPI_KEY=${{ secrets.VITE_GOONGAPI_KEY }}
          VITE_JOB_SEEKER_BOT_AGENT_ID=${{ secrets.VITE_JOB_SEEKER_BOT_AGENT_ID }}
          VITE_EMPLOYER_BOT_AGENT_ID=${{ secrets.VITE_EMPLOYER_BOT_AGENT_ID }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          EOF

      - name: 🏗️ Build with Vite
        run: npm run build

      - name: 📁 Verify build output
        run: |
          echo "=== Build output ==="
          ls -lah ${{ env.BUILD_DIR }}/
          echo "=== Total size ==="
          du -sh ${{ env.BUILD_DIR }}/

      - name: 💾 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}/
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 4 — Deploy to Cloudflare Pages
  #          (only on push to main)
  # ──────────────────────────────────────────────
  deploy:
    name: 🌍 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://imyanya-web.pages.dev

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⬇️ Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}

      - name: 🌍 Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: imyanya-web
          directory: ${{ env.BUILD_DIR }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 5 — Notify (success or failure)
  # ──────────────────────────────────────────────
  notify:
    name: 📣 Notify Status
    runs-on: ubuntu-latest
    needs: [ build, deploy ]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: ✅ Success notification
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          echo "✅ Deployment successful!"
          echo "🌍 Live at: https://imyanya-web.pages.dev"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"

      - name: ❌ Failure notification
        if: ${{ needs.build.result == 'failure' || needs.deploy.result == 'failure' }}
        run: |
          echo "❌ Pipeline failed!"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo "🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
